<div>
  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">

    @if (errorMessage) {
      <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm">
        {{ errorMessage }}
      </div>
    }

    @if (successMessage) {
      <div class="mb-4 p-3 bg-green-100 text-green-700 rounded-xl text-sm">
        {{ successMessage }}
      </div>
    }

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe actuel</label>
      <input formControlName="currentPassword" type="password"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe</label>
      <input formControlName="newPassword" type="password"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Confirmer le mot de passe</label>
      <input formControlName="confirmPassword" type="password"
             class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="flex gap-4">
      <button type="submit"
              [disabled]="passwordForm.invalid || isLoading"
              class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition">
        {{ isLoading ? 'Enregistrement...' : 'Confirmer' }}
      </button>
      <button type="button"
              (click)="onClose()"
              class="flex-1 border border-gray-300 hover:bg-gray-50 font-medium py-3 rounded-xl transition">
        Annuler
      </button>
    </div>

  </form>
</div>
