<div class="app" [class.dark]="isDark">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">TicketFlow</div>
      <div class="breadcrumb">
        Tunisie Telecom › {{ getTitle() }}
      </div>
    </div>
    <div class="topbar-right">

      <!-- Thème -->
      <button class="theme-toggle" (click)="toggleTheme()">
        {{ isDark ? '☀ Mode clair' : '🌙 Mode sombre' }}
      </button>

      <!-- User -->
      <div class="user-pill">
        <div class="avatar">{{ getInitials() }}</div>
        <span>{{ currentUser?.prenom }} {{ currentUser?.nom }}</span>
      </div>

      <!-- Logout -->
      <button class="logout-btn" (click)="logout()">
        ⎋ Déconnexion
      </button>
    </div>
  </header>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="nav"
           [class.active]="view === 'list'"
           (click)="view = 'list'">
        ☰ Mes tickets
      </div>
      <div class="nav"
           [class.active]="view === 'create'"
           (click)="view = 'create'">
        + Nouveau ticket
      </div>
    </aside>

    <!-- Content -->
    <main class="content">
      <div class="page-container">
        <app-add-ticket
          *ngIf="view === 'create'">
        </app-add-ticket>
        <app-listeticket
          *ngIf="view === 'list'">
        </app-listeticket>
      </div>
    </main>

  </div>
</div>
