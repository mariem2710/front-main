<div class="add-ticket-wrapper">

  <div class="content">

    <div class="form-card">

      <!-- HEADER -->
      <div class="form-header">
        <div class="form-header-left">
          <span class="form-title">Créer un ticket d'incident</span>

          <span class="form-sub">
            Statut automatique : À traiter — {{ today | date:'dd/MM/yyyy' }}
          </span>
        </div>

        <span class="form-header-badge">
          <span class="badge-dot"></span>À traiter
        </span>
      </div>

      <!-- BODY -->
      <div class="form-body">

        <!-- TITRE -->
        <div class="form-row">
          <label class="form-label">Titre *</label>
          <input class="form-input"
                 [(ngModel)]="ticket.titre"
                 name="titre"
                 required
                 placeholder="Ex : Coupure fibre..." />
        </div>

        <!-- DESCRIPTION -->
        <div class="form-row">
          <label class="form-label">Description *</label>
          <textarea class="form-textarea"
                    [(ngModel)]="ticket.description"
                    name="description"
                    required>
          </textarea>
        </div>

        <!-- PRIORITE -->
        <div class="form-row">
          <label class="form-label">Priorité *</label>
          <select class="form-select"
                  [(ngModel)]="ticket.priorite"
                  name="priorite"
                  required>
            <option value="">-- Sélectionner --</option>
            <option value="BASSE">Basse</option>
            <option value="MOYENNE">Moyenne</option>
            <option value="HAUTE">Haute</option>
          </select>
        </div>

        <!-- DATE -->
        <div class="form-row">
          <label class="form-label">Date souhaitée *</label>
          <input type="date"
                 class="form-input"
                 [(ngModel)]="ticket.dateSouhaite"
                 name="dateSouhaite"
                 [min]="minDate"
                 required />
        </div>

      </div>

      <!-- FOOTER -->
      <div class="form-footer">

        <button class="btn btn-ghost" (click)="resetForm()">
          Réinitialiser
        </button>

        <button class="btn btn-primary"
                (click)="createTicket()"
                [disabled]="!isFormValid()">
          Créer le ticket
        </button>

      </div>

    </div>

  </div>

</div>
