<div class="prog-card" *ngIf="progression">

  <!-- Badge fermé -->
  <div class="badge-ferme" *ngIf="progression.ferme">
    🎉 Ticket clôturé automatiquement
  </div>

  <!-- Cercle SVG -->
  <div class="circle-container">
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle cx="80" cy="80" r="54"
        fill="none" stroke="#e5e7eb" stroke-width="10"/>
      <circle cx="80" cy="80" r="54"
        fill="none"
        [attr.stroke]="strokeColor"
        stroke-width="10"
        stroke-linecap="round"
        [attr.stroke-dasharray]="2 * 3.14159 * 54"
        [attr.stroke-dashoffset]="strokeDashoffset"
        transform="rotate(-90 80 80)"
        style="transition: stroke-dashoffset 0.8s ease, stroke 0.4s"/>
      <text x="80" y="74" text-anchor="middle"
        font-size="24" font-weight="600" fill="currentColor">
        {{ progression.progression }}%
      </text>
      <text x="80" y="96" text-anchor="middle"
        font-size="12" fill="#9ca3af">
        {{ progression.tachesFaites }}/{{ progression.totalTaches }} tâches
      </text>
    </svg>
  </div>

  <!-- Légende couleurs -->
  <div class="legende">
    <span class="dot amber"></span> Démarré
    <span class="dot indigo"></span> Avancé (&gt;50%)
    <span class="dot green"></span> Terminé
  </div>

</div>
